name: 13-caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        description: 'weather to execute cache'
        required: true
        default: true
        type: boolean

jobs:

    build:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: 13-caching/react-app
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                path: 13-caching/react-app
            - name: checkout code
              uses: actions/checkout@v4
            - name: checkout code
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
               node-version: '20.x'
            - name: Install dependencies
              run: npm ci
            - name: Testing
              run: npm run test
            - name: Building
              run: npm run build
            - name: Deploy to non prod environment
              run: echo "Deploying to non prod environment"

        #1.check the code
        #2.install dependensices
        #3.Linting, formatting, unit testing, building
        #4.deploy to a non prod environment
        
